<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Typing Vocab MVP</title>
  <style>
    :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    body { margin: 0; padding: 16px; }
    .wrap { max-width: 720px; margin: 0 auto; }
    .card { border: 1px solid #ddd; border-radius: 16px; padding: 16px; transition: background 0.3s, border-color 0.3s, box-shadow 0.3s; }
    .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .spacer { height: 12px; }
    .big { font-size: 22px; font-weight: 700; line-height: 1.3; }
    .titleRow { display: flex; gap: 12px; align-items: baseline; }
    .statusInline { font-weight: 700; }
    .sheetRow { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
    .sheetList { border: 1px solid #ddd; border-radius: 16px; padding: 16px; }
    .sheetItems { display: grid; gap: 8px; }
    .sheetItemBtn { text-align: left; }

    .hint { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 18px; }
    .example { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 18px; color: #333; white-space: pre-wrap; }
    .hidden { display: none; }

    .inputWrap { position: relative; }
    input[type="text"] {
      width: 100%;
      font-size: 18px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ccc;
      background: transparent;
      position: relative;
      z-index: 2;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .ghost {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: #999;
      white-space: pre;
      pointer-events: none;
      z-index: 1;
    }
    .ghost .typed { color: transparent; }
    .ghost .rest { color: #aaa; }

    button { font-size: 16px; padding: 10px 14px; border-radius: 12px; border: 1px solid #bbb; background: #fff; cursor: pointer; }
    button.primary { border-color: #000; }
    button:disabled { opacity: 0.5; }
    .status { min-height: 24px; font-weight: 600; }
    .ok { color: #0a7; }
    .ng { color: #c33; }
    .muted { color: #666; font-size: 13px; }
    .pill { border: 1px solid #ddd; padding: 4px 10px; border-radius: 999px; font-size: 13px; color: #444; }

    /* ---- Shake ---- */
    .shake { animation: shake 120ms linear 1; }
    @keyframes shake {
      0%   { transform: translateX(0); }
      25%  { transform: translateX(-2px); }
      50%  { transform: translateX(2px); }
      75%  { transform: translateX(-2px); }
      100% { transform: translateX(0); }
    }

    /* ---- Card flash ---- */
    .card.flash-ok {
      animation: cardFlashOk 0.55s ease forwards;
    }
    .card.flash-ng {
      animation: cardFlashNg 0.45s ease forwards;
    }
    @keyframes cardFlashOk {
      0%   { background: #fff; border-color: #ddd; box-shadow: none; }
      35%  { background: #d4f5e8; border-color: #28a745; box-shadow: 0 0 24px rgba(40,167,69,0.35); }
      100% { background: #fff; border-color: #ddd; box-shadow: none; }
    }
    @keyframes cardFlashNg {
      0%   { background: #fff; border-color: #ddd; box-shadow: none; }
      35%  { background: #fde8e8; border-color: #dc3545; box-shadow: 0 0 18px rgba(220,53,69,0.3); }
      100% { background: #fff; border-color: #ddd; box-shadow: none; }
    }

    /* ---- Slide-in for next question ---- */
    .slide-in {
      animation: slideIn 0.28s cubic-bezier(0.22,1,0.36,1);
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(24px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ---- Score pill bounce ---- */
    .pill-bounce {
      animation: pillBounce 0.32s ease;
    }
    @keyframes pillBounce {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.35); }
      100% { transform: scale(1); }
    }

    /* ---- Combo display (fixed, top-right) ---- */
    #comboDisplay {
      position: fixed;
      top: 18px;
      right: 18px;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: #ff6b35;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.08);
      opacity: 0;
      transform: scale(0.6) translateY(-8px);
      transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
    }
    #comboDisplay.visible {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
    #comboDisplay.level2 { color: #9c27b0; font-size: 26px; }
    #comboDisplay.level3 { color: #e91e63; font-size: 32px; }
    #comboDisplay.level4 { color: #f44336; font-size: 38px; text-shadow: 2px 2px 0 rgba(0,0,0,0.12); }

    /* ---- Praise float popup ---- */
    .praise-popup {
      position: fixed;
      font-size: 20px;
      font-weight: 800;
      color: #00897b;
      pointer-events: none;
      z-index: 300;
      animation: praiseFloat 0.9s ease forwards;
    }
    @keyframes praiseFloat {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      60%  { opacity: 0.9; transform: translateY(-28px) scale(1.15); }
      100% { opacity: 0; transform: translateY(-52px) scale(1.2); }
    }

    /* ---- Streak bar ---- */
    #streakBarWrap {
      height: 5px;
      background: #f0f0f0;
      border-radius: 3px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    #streakBar {
      height: 100%;
      width: 0%;
      border-radius: 3px;
      background: linear-gradient(90deg, #ff6b35 0%, #ffd93d 40%, #6bcb77 70%, #4d96ff 100%);
      transition: width 0.6s cubic-bezier(0.22,1,0.36,1);
    }

    /* ---- Mute button ---- */
    #muteBtn {
      position: fixed;
      bottom: 16px;
      right: 16px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      font-size: 18px;
      padding: 0;
      border: 1px solid #ddd;
      background: rgba(255,255,255,0.92);
      cursor: pointer;
      z-index: 150;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
      line-height: 1;
    }
    #muteBtn:hover { background: #f5f5f5; }

    /* ---- Confetti canvas ---- */
    #confettiCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <canvas id="confettiCanvas"></canvas>
  <div id="comboDisplay"></div>
  <button id="muteBtn" title="サウンドON/OFF">🔊</button>

  <div class="wrap">
    <div class="sheetRow">
      <button id="switchSheetBtn">&#x30B7;&#x30FC;&#x30C8;&#x306E;&#x5207;&#x308A;&#x66FF;&#x3048;</button>

          <div class="pill" id="posPill">品詞: -</div>
          <div class="pill" id="counterPill">0 / 0</div>

          <div class="status statusInline" id="statusText"></div>
        </div>

        <div class="hint" id="hintText"></div>
        <div class="spacer"></div>

        <div class="inputWrap" id="inputWrap">
          <div class="ghost" id="ghostText" aria-hidden="true"></div>
          <input id="answerInput" type="text" inputmode="text" autocomplete="off" autocapitalize="none" spellcheck="false"
                 placeholder="英語を入力してEnter（または「判定」）" />

        <div class="spacer"></div>

      使い方：通常はそのまま入力して判定。ヒント→答えの順に押すと「なぞりモード」に入り、答えをタイピングでなぞると即次へ（ミス扱い）。
    </div>

<script>
/** ---------- Data Loader ---------- **/
const SHEET_ID = "1AqqXZoShbq2OhnFW-lhUTlD0tIGlMPf8VNfOPcraNow";
const DEFAULT_GID = "743650624";
const LIST_GID = "1137954113";
const STORAGE_GID_KEY = "wv.sheet.gid";
const STORAGE_NAME_KEY = "wv.sheet.name";
const STATIC_DATA_ROOT = "./data";
const STATIC_LIST_URL = `${STATIC_DATA_ROOT}/list.json`;
const STATIC_SHEET_DIR = `${STATIC_DATA_ROOT}/sheets`;
const PREFER_STATIC_DATA = location.protocol !== "file:";

let staticSheetListCache = null;

function buildSheetCsvUrl(gid) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;
}

function buildStaticSheetUrl(gid) {
  return `${STATIC_SHEET_DIR}/${normalizeGid(gid)}.json`;
}

async function loadCSV(url) {
  const res = await fetch(url, { cache: "default" });
  if (!res.ok) throw new Error("CSV読み込み失敗 " + res.status);
  const text = await res.text();
  return parseCSV(text);
}

async function loadJSON(url) {
  const res = await fetch(url, { cache: "default" });
  if (!res.ok) throw new Error(`JSON load failed ${res.status}`);
  return res.json();
}

function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    const next = text[i + 1];

    if (inQuotes) {
      if (ch === '"' && next === '"') { cell += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { cell += ch; }
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ',') { row.push(cell); cell = ""; }
      else if (ch === '\n') { row.push(cell); rows.push(row); row = []; cell = ""; }
      else if (ch === '\r') { /* ignore */ }
      else { cell += ch; }
    }
  }
  if (cell.length > 0 || row.length > 0) { row.push(cell); rows.push(row); }
  return rows.filter(r => r.some(c => String(c).trim() !== ""));
}

function mapRowToItem(rowLike) {
  let exampleEn = String(rowLike[4] ?? "").trim();
  let exampleJp = String(rowLike[5] ?? "").trim();
  if (!exampleEn && /[A-Za-z]/.test(exampleJp)) {
    exampleEn = exampleJp;
    exampleJp = String(rowLike[6] ?? "").trim();
  }
  return {
    id: String(rowLike[0] ?? "").trim(),
    en: String(rowLike[1] ?? "").trim(),
    jp: String(rowLike[2] ?? "").trim(),
    pos: String(rowLike[3] ?? "").trim(),
    exampleEn,
    exampleJp,
    wrongCount: 0,
  };
}

function rowsToItems(rows) {
  const startIndex = (rows.length > 0 && !/^\d+$/.test(String(rows[0][0]).trim())) ? 1 : 0;
  return rows
    .slice(startIndex)
    .map(mapRowToItem)
    .filter(item => item.en && item.jp);
}

function normalizeStaticSheetList(data) {
  const sheets = Array.isArray(data?.sheets) ? data.sheets : [];
  return sheets.map(entry => ({
    name: String(entry?.name ?? "").trim(),
    gid: normalizeGid(entry?.gid ?? ""),
    hash: String(entry?.hash ?? "").trim(),
    updatedAt: String(entry?.updatedAt ?? "").trim(),
    itemCount: Number(entry?.itemCount ?? 0),
  })).filter(entry => entry.name && entry.gid);
}

function normalizeStaticSheetData(data, fallbackGid) {
  const rawItems = Array.isArray(data?.items) ? data.items : [];
  return {
    gid: normalizeGid(data?.gid ?? fallbackGid),
    name: String(data?.name ?? "").trim(),
    hash: String(data?.hash ?? "").trim(),
    updatedAt: String(data?.updatedAt ?? "").trim(),
    items: rawItems.map(item => ({
      id: String(item?.id ?? "").trim(),
      en: String(item?.en ?? "").trim(),
      jp: String(item?.jp ?? "").trim(),
      pos: String(item?.pos ?? "").trim(),
      exampleEn: String(item?.exampleEn ?? "").trim(),
      exampleJp: String(item?.exampleJp ?? "").trim(),
      wrongCount: 0,
    })).filter(item => item.en && item.jp),
  };
}

async function loadStaticSheetList() {
  if (!PREFER_STATIC_DATA) {
    throw new Error("static data disabled on file protocol");
  }
  if (staticSheetListCache) {
    return staticSheetListCache;
  }
  const data = await loadJSON(STATIC_LIST_URL);
  const list = normalizeStaticSheetList(data);
  if (!list.length) {
    throw new Error("static sheet list is empty");
  }
  staticSheetListCache = list;
  return list;
}

async function loadSheetListFromCsv() {
  if (!LIST_GID || LIST_GID === "PUT_LIST_GID_HERE") {
    throw new Error("LIST_GID is not set");
  }
  const rows = await loadCSV(buildSheetCsvUrl(LIST_GID));
  const start = (rows.length > 0 && !/^\d+$/.test(String(rows[0][1]).trim())) ? 1 : 0;
  return rows.slice(start).map(r => ({
    name: String(r[0] ?? "").trim(),
    gid: normalizeGid(r[1] ?? ""),
    hash: String(r[2] ?? "").trim(),
    updatedAt: String(r[3] ?? "").trim(),
    itemCount: 0,
  })).filter(entry => entry.name && entry.gid);
}

async function loadStaticSheetData(gid) {
  if (!PREFER_STATIC_DATA) {
    throw new Error("static data disabled on file protocol");
  }
  const data = await loadJSON(buildStaticSheetUrl(gid));
  const normalized = normalizeStaticSheetData(data, gid);
  if (!normalized.items.length) {
    throw new Error("static sheet is empty");
  }
  return normalized;
}

async function loadSheetDataFromCsv(gid) {
  const rows = await loadCSV(buildSheetCsvUrl(gid));
  return {
    gid: normalizeGid(gid),
    name: "",
    hash: "",
    updatedAt: "",
    items: rowsToItems(rows),
  };
}

async function loadSheetData(gid) {
  try {
    const data = await loadStaticSheetData(gid);
    setDebug(`source=static gid=${data.gid} items=${data.items.length}`);
    return data;
  } catch (staticError) {
    const data = await loadSheetDataFromCsv(gid);
    setDebug(`source=sheets gid=${data.gid} items=${data.items.length}`);
    return data;
  }
}

/** ---------- Quiz Logic ---------- **/
const ui = {
  jpText: document.getElementById("jpText"),
  posPill: document.getElementById("posPill"),
  hintText: document.getElementById("hintText"),
  exampleText: document.getElementById("exampleText"),
  answerInput: document.getElementById("answerInput"),
  inputWrap: document.getElementById("inputWrap"),
  ghostText: document.getElementById("ghostText"),
  statusText: document.getElementById("statusText"),
  debugText: document.getElementById("debugText"),
  hintBtn: document.getElementById("hintBtn"),
  switchSheetBtn: document.getElementById("switchSheetBtn"),
  sheetNamePill: document.getElementById("sheetNamePill"),
  sheetListView: document.getElementById("sheetListView"),
  sheetList: document.getElementById("sheetList"),
  closeSheetListBtn: document.getElementById("closeSheetListBtn"),
  quizView: document.getElementById("quizView"),
  quizCard: document.getElementById("quizCard"),
  exampleBtn: document.getElementById("exampleBtn"),
  checkBtn: document.getElementById("checkBtn"),
  confirmBtn: document.getElementById("confirmBtn"),
  counterPill: document.getElementById("counterPill"),
  scorePill: document.getElementById("scorePill"),
  comboDisplay: document.getElementById("comboDisplay"),
  streakBar: document.getElementById("streakBar"),
  confettiCanvas: document.getElementById("confettiCanvas"),
};
window.ui = ui;

let items = [];
let current = null;
let idx = 0;
let asked = 0;
let ok = 0, ng = 0;
const NEXT_DELAY_MS = 1000;
const WRONG_WEIGHT = 3;
let activeGid = DEFAULT_GID;
let activeName = "-";
const CONFIRM_LABEL = "答えを表示(失敗なし)";
const NEXT_LABEL = "次の単語";

// hint/reveal state
let revealMode = false;
let traceMode = false;
let traceTarget = "";
let traceTyped = "";
let exampleVisible = false;
let isComposing = false;
let confirmRevealed = false;

// ---- Effect state ----
let combo = 0;
let soundEnabled = true;
let audioCtx = null;
let comboHideTimer = null;

const PRAISE_NORMAL = ["よし！", "ナイス！", "いいね！", "正解！", "完璧！", "さすが！"];
const PRAISE_COMBO = {
  3:  ["3連続！🔥", "コンボ！🔥", "ノリノリ！🔥"],
  5:  ["5連続！⚡", "すごい！⚡", "止まらない！⚡"],
  7:  ["7連続！🌟", "天才！🌟", "最高！🌟"],
  10: ["10連続！👑", "圧倒的！👑", "レジェンド！👑"],
  15: ["15連続！💎", "無双！💎"],
  20: ["20連続！🌈", "神業！🌈"],
};

// ---- Audio ----
function getAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { return null; }
  }
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}

function playTone(freq, startTime, duration, gain, ctx, type = "sine") {
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startTime);
  g.gain.setValueAtTime(gain, startTime);
  g.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.connect(g);
  g.connect(ctx.destination);
  osc.start(startTime);
  osc.stop(startTime + duration);
}

function playSound(type) {
  if (!soundEnabled) return;
  const ctx = getAudioCtx();
  if (!ctx) return;
  const t = ctx.currentTime;

  if (type === "correct") {
    playTone(523.25, t,       0.12, 0.25, ctx); // C5
    playTone(659.25, t+0.10, 0.14, 0.25, ctx); // E5
    playTone(783.99, t+0.20, 0.20, 0.22, ctx); // G5
  } else if (type === "combo") {
    playTone(523.25, t,       0.10, 0.25, ctx);
    playTone(659.25, t+0.08, 0.10, 0.25, ctx);
    playTone(783.99, t+0.16, 0.10, 0.25, ctx);
    playTone(1046.5, t+0.24, 0.25, 0.25, ctx);
  } else if (type === "bigcombo") {
    playTone(523.25, t,       0.10, 0.25, ctx);
    playTone(659.25, t+0.07, 0.10, 0.25, ctx);
    playTone(783.99, t+0.14, 0.10, 0.25, ctx);
    playTone(1046.5, t+0.21, 0.10, 0.25, ctx);
    playTone(1318.5, t+0.28, 0.35, 0.28, ctx);
  } else if (type === "wrong") {
    playTone(220, t,      0.08, 0.20, ctx, "sawtooth");
    playTone(180, t+0.09, 0.18, 0.18, ctx, "sawtooth");
  }
}

// ---- Confetti ----
let confettiAnim = null;
function launchConfetti(count = 50) {
  const canvas = ui.confettiCanvas;
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ["#ff6b6b","#ffd93d","#6bcb77","#4d96ff","#c77dff","#ff922b","#20c997"];
  const particles = Array.from({length: count}, () => ({
    x: canvas.width * (0.2 + Math.random() * 0.6),
    y: -10 - Math.random() * 60,
    w: 7 + Math.random() * 8,
    h: 4 + Math.random() * 5,
    color: colors[Math.floor(Math.random() * colors.length)],
    rot: Math.random() * Math.PI * 2,
    rotV: (Math.random() - 0.5) * 0.22,
    vx: (Math.random() - 0.5) * 4,
    vy: 2 + Math.random() * 3.5,
    alpha: 1,
  }));

  if (confettiAnim) cancelAnimationFrame(confettiAnim);
  let frame = 0;

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    for (const p of particles) {
      if (p.y > canvas.height + 20) continue;
      alive = true;
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += 0.07;
      p.rot += p.rotV;
      if (frame > 60) p.alpha = Math.max(0, p.alpha - 0.015);
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    }
    frame++;
    if (alive && frame < 200) {
      confettiAnim = requestAnimationFrame(draw);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confettiAnim = null;
    }
  }
  draw();
}

// ---- Praise popup ----
function showPraise(text) {
  const el = document.createElement("div");
  el.className = "praise-popup";
  el.textContent = text;
  // position near the status text
  const rect = ui.statusText.getBoundingClientRect();
  el.style.left = (rect.left + window.scrollX) + "px";
  el.style.top  = (rect.top  + window.scrollY - 10) + "px";
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 950);
}

function getPraiseText(c) {
  // find highest threshold <= c
  let words = PRAISE_NORMAL;
  for (const threshold of [20, 15, 10, 7, 5, 3]) {
    if (c >= threshold) { words = PRAISE_COMBO[threshold]; break; }
  }
  return words[Math.floor(Math.random() * words.length)];
}

// ---- Combo display ----
function showComboDisplay(c) {
  clearTimeout(comboHideTimer);
  const el = ui.comboDisplay;
  el.className = "";
  el.textContent = getPraiseText(c);
  if      (c >= 10) el.classList.add("level4");
  else if (c >= 7)  el.classList.add("level3");
  else if (c >= 5)  el.classList.add("level2");

  void el.offsetWidth; // reflow to restart transition
  el.classList.add("visible");
  comboHideTimer = setTimeout(() => {
    el.classList.remove("visible");
  }, 1800);
}

// ---- Streak bar ----
function updateStreakBar() {
  // bar = combo / 20 * 100%, capped at 100%
  const pct = Math.min(100, combo * 5);
  ui.streakBar.style.width = pct + "%";
}

// ---- Card flash ----
function flashCard(type) {
  const card = ui.quizCard;
  card.classList.remove("flash-ok", "flash-ng");
  void card.offsetWidth;
  card.classList.add(type === "ok" ? "flash-ok" : "flash-ng");
}

// ---- normalizeGid ----
function normalizeGid(value) {
  const m = String(value || "").match(/\d+/);
  return m ? m[0] : "";
}

function setView(mode) {
  const showList = mode === "list";
  if (ui.sheetListView) ui.sheetListView.classList.toggle("hidden", !showList);
  if (ui.quizView) ui.quizView.classList.toggle("hidden", showList);
}

function setActiveSheet(gid, name) {
  activeGid = normalizeGid(gid || DEFAULT_GID);
  if (activeGid === LIST_GID) activeGid = DEFAULT_GID;
  activeName = String(name || "-");
  localStorage.setItem(STORAGE_GID_KEY, activeGid);
  localStorage.setItem(STORAGE_NAME_KEY, activeName);
  if (ui.sheetNamePill) ui.sheetNamePill.textContent = `セット: ${activeName}`;
}

function loadActiveSheetFromStorage() {
  let gid = normalizeGid(localStorage.getItem(STORAGE_GID_KEY) || DEFAULT_GID);
  let name = localStorage.getItem(STORAGE_NAME_KEY) || "-";
  if (gid === LIST_GID) { gid = DEFAULT_GID; name = "-"; }
  setActiveSheet(gid, name);
}

async function loadSheetList() {
  try {
    const list = await loadStaticSheetList();
    setDebug(`source=static list=${list.length}`);
    return list;
  } catch (staticError) {
    const list = await loadSheetListFromCsv();
    setDebug(`source=sheets list=${list.length}`);
    return list;
  }
}

function renderSheetList(list) {
  if (!ui.sheetList) return;
  ui.sheetList.innerHTML = "";
  for (const item of list) {
    const btn = document.createElement("button");
    btn.className = "sheetItemBtn";
    btn.textContent = item.name;
    btn.addEventListener("click", async () => {
      try {
        setActiveSheet(item.gid, item.name);
        await loadItemsForActiveSheet();
        setView("quiz");
        setStatus("");
      } catch (e) {
        setStatus(String(e), "ng");
      }
    });
    ui.sheetList.appendChild(btn);
  }
}

async function loadItemsForActiveSheet() {
  let gid = activeGid || DEFAULT_GID;
  if (!gid) { setActiveSheet(DEFAULT_GID, activeName); gid = DEFAULT_GID; }

  let data = await loadSheetData(gid);
  if (data.items.length === 0 && gid !== DEFAULT_GID) {
    setActiveSheet(DEFAULT_GID, activeName);
    gid = DEFAULT_GID;
    data = await loadSheetData(gid);
  }

  if (data.name) setActiveSheet(gid, data.name);
  items = data.items;
  shuffleInPlace(items);

  if (items.length === 0) throw new Error("有効な単語行が0件でした（CSV列を確認してください）");

  idx = 0;
  asked = 1;
  ok = 0; ng = 0;
  combo = 0;
  updateStreakBar();
  current = items[idx];
  ui.jpText.textContent = current.jp;
  if (ui.exampleText) ui.exampleText.textContent = maskExample(current.exampleEn, current.en);
  ui.posPill.textContent = `品詞: ${current.pos || "-"}`;
  setExampleVisible(false);
  updatePills();
  ui.answerInput.focus();
}

function normalizeEn(s) {
  return String(s).toLowerCase().trim().replace(/\s+/g, " ").replace(/['']/g, "'");
}

function hasPinyinMarks(s) {
  return /[āáǎàēéěèīíǐìōóǒòūúǔùǖǘǚǜü]/.test(String(s));
}

function normalizePinyin(s) {
  return String(s).toLowerCase().trim().normalize("NFD").replace(/[̀-ͯ]/g, "").replace(/ü/g, "u").replace(/v/g, "u").replace(/\s+/g, " ");
}

function normalizeAnswerPair(userRaw, answerRaw) {
  if (hasPinyinMarks(answerRaw)) {
    return { user: normalizePinyin(userRaw), answer: normalizePinyin(answerRaw) };
  }
  return { user: normalizeEn(userRaw), answer: normalizeEn(answerRaw) };
}

function setStatus(msg, cls) {
  ui.statusText.className = "status " + (cls || "");
  ui.statusText.textContent = msg || "";
}
function setHint(text) { ui.hintText.textContent = text || ""; }
function setDebug(text) { ui.debugText.textContent = text || ""; }

function updatePills(okBounce, ngBounce) {
  ui.counterPill.textContent = `${asked} / ${items.length}`;
  ui.scorePill.textContent = `✅${ok} / ❌${ng}`;
  if (okBounce || ngBounce) {
    ui.scorePill.classList.remove("pill-bounce");
    void ui.scorePill.offsetWidth;
    ui.scorePill.classList.add("pill-bounce");
  }
}

function escapeRegExp(s) {
  return String(s).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function maskExample(exampleRaw, answerRaw) {
  const example = String(exampleRaw || "").trim();
  const answer = String(answerRaw || "").trim();
  if (!example || !answer) return example;
  const pattern = new RegExp(escapeRegExp(answer), "ig");
  return example.replace(pattern, (m) => m.replace(/[A-Za-z]/g, "_"));
}

function makeHint(answerRaw) {
  const a = String(answerRaw).trim();
  if (a.toLowerCase().startsWith("to ")) {
    const rest = a.slice(3);
    if (rest.length === 0) return "to _";
    const firstChar = rest[0];
    let masked = "";
    for (let i = 1; i < rest.length; i++) masked += (rest[i] === " ") ? " " : "_";
    return "to " + firstChar + masked;
  }
  if (!a) return "";
  const first = a[0];
  let masked = "";
  for (let i = 1; i < a.length; i++) masked += (a[i] === " ") ? " " : "_";
  return first + masked;
}

function resetHintAndTraceUI() {
  revealMode = false;
  traceMode = false;
  traceTarget = "";
  traceTyped = "";
  confirmRevealed = false;
  ui.hintBtn.textContent = "ヒントを表示";
  if (ui.confirmBtn) ui.confirmBtn.textContent = CONFIRM_LABEL;
  setHint("");
  setGhost("");
  ui.checkBtn.disabled = false;
  ui.answerInput.value = "";
  ui.answerInput.readOnly = false;
  ui.answerInput.placeholder = "英語を入力してEnter（または「判定」）";
}

function setGhost(target) {
  if (!target) { ui.ghostText.innerHTML = ""; return; }
  const typed = escapeHtml(traceTyped);
  const rest = escapeHtml(target.slice(traceTyped.length));
  ui.ghostText.innerHTML = `<span class="typed">${typed}</span><span class="rest">${rest}</span>`;
}

function setExampleVisible(visible) {
  exampleVisible = visible;
  if (!ui.exampleText) return;
  ui.exampleText.classList.toggle("hidden", !visible);
  ui.exampleBtn.textContent = visible ? "例文を隠す" : "例文を表示";
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}

function shuffleInPlace(list) {
  for (let i = list.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [list[i], list[j]] = [list[j], list[i]];
  }
}

function getWeight(item) {
  return 1 + (item.wrongCount || 0) * WRONG_WEIGHT;
}

function pickNextIndex() {
  if (items.length <= 1) return 0;
  let total = 0;
  for (const item of items) total += getWeight(item);
  let r = Math.random() * total;
  for (let i = 0; i < items.length; i++) {
    r -= getWeight(items[i]);
    if (r <= 0) return i;
  }
  return 0;
}

function nextQuestion() {
  asked++;
  idx = pickNextIndex();
  current = items[idx];

  // slide animation on question text
  ui.jpText.classList.remove("slide-in");
  void ui.jpText.offsetWidth;
  ui.jpText.classList.add("slide-in");

  ui.jpText.textContent = current.jp;
  ui.posPill.textContent = `品詞: ${current.pos || "-"}`;
  resetHintAndTraceUI();
  if (ui.exampleText) ui.exampleText.textContent = maskExample(current.exampleEn, current.en);
  setStatus("");
  setDebug("");
  updatePills();
  ui.answerInput.focus();
}

function markWrong(reason) {
  combo = 0;
  ng++;
  current.wrongCount = (current.wrongCount || 0) + 1;

  playSound("wrong");
  flashCard("ng");
  updateStreakBar();

  setStatus(reason || "ミス", "ng");
  updatePills(false, true);
}

function markCorrect() {
  combo++;
  ok++;

  // Sound: escalate with combo
  if      (combo >= 10) playSound("bigcombo");
  else if (combo >= 3)  playSound("combo");
  else                  playSound("correct");

  flashCard("ok");
  updateStreakBar();

  // Confetti: always on big combo, occasionally otherwise
  const confettiCount = combo >= 10 ? 120 : combo >= 5 ? 80 : combo >= 3 ? 55 : 30;
  if (combo >= 3 || Math.random() < 0.35) {
    launchConfetti(confettiCount);
  }

  // Praise popup
  showPraise(getPraiseText(combo));

  // Combo display
  if (combo >= 3) showComboDisplay(combo);

  setStatus("正解！", "ok");
  updatePills(true, false);
}

function checkAnswer() {
  if (confirmRevealed) return;
  if (traceMode || isComposing) return;
  const normalized = normalizeAnswerPair(ui.answerInput.value, current.en);
  const user = normalized.user;
  const ans = normalized.answer;
  if (!user) { setStatus("未入力です", "ng"); return; }

  if (user === ans) {
    markCorrect();
    setTimeout(nextQuestion, NEXT_DELAY_MS);
  } else {
    // break combo on typing wrong
    combo = 0;
    updateStreakBar();
    playSound("wrong");
    flashCard("ng");
    setStatus("違います（もう一回）", "ng");
  }
}

/** ---- Trace Mode (なぞり) ---- **/
function enterTraceMode() {
  traceMode = true;
  ui.checkBtn.disabled = true;
  ui.answerInput.value = "";
  ui.answerInput.placeholder = "";
  traceTarget = String(current.en).trim();
  traceTyped = "";
  setGhost(traceTarget);
  setStatus("答えをなぞってください（ミス扱い）", "ng");
  setDebug("");
  ui.answerInput.focus();
}

function flashWrongKey() {
  ui.inputWrap.classList.remove("shake");
  void ui.inputWrap.offsetWidth;
  ui.inputWrap.classList.add("shake");
}

function onBeforeInput(ev) {
  if (!traceMode) return;
  if (hasPinyinMarks(current.en)) return;
  if (isComposing || ev.isComposing) return;

  const t = ev.inputType || "";
  if (t.startsWith("delete") || t === "insertFromPaste" || t === "insertFromDrop") {
    ev.preventDefault();
    return;
  }

  const data = ev.data;
  if (typeof data !== "string" || data.length === 0) {
    ev.preventDefault();
    return;
  }

  let remaining = data;
  let newTyped = traceTyped;

  for (const ch of remaining) {
    const expected = traceTarget[newTyped.length];
    if (expected == null) break;

    if (ch === expected) {
      newTyped += ch;
    } else {
      flashWrongKey();
      ev.preventDefault();
      ui.answerInput.value = newTyped;
      traceTyped = newTyped;
      setGhost(traceTarget);
      return;
    }
  }

  ev.preventDefault();
  traceTyped = newTyped;
  ui.answerInput.value = traceTyped;
  setGhost(traceTarget);

  if (traceTyped.length >= traceTarget.length) {
    setStatus("OK（次へ）", "ok");
    setTimeout(nextQuestion, NEXT_DELAY_MS);
  }
}

function onKeyDownFallback(ev) {
  if (!traceMode) return;
  if (ev.key === "Enter" || ev.key === "Backspace") {
    ev.preventDefault();
    return;
  }
}

function onCompositionStart() { isComposing = true; }

function onCompositionEnd() {
  isComposing = false;
  if (!traceMode) return;
  if (hasPinyinMarks(traceTarget)) {
    const normalized = normalizeAnswerPair(ui.answerInput.value, traceTarget);
    if (normalized.user === normalized.answer) {
      setStatus("OK???", "ok");
      setTimeout(nextQuestion, NEXT_DELAY_MS);
    }
    return;
  }
  const value = ui.answerInput.value;
  const expectedPrefix = traceTarget.slice(0, value.length);
  if (value === expectedPrefix) {
    traceTyped = value;
    setGhost(traceTarget);
    if (traceTyped.length >= traceTarget.length) {
      setStatus("OK???", "ok");
      setTimeout(nextQuestion, NEXT_DELAY_MS);
    }
  } else {
    flashWrongKey();
    ui.answerInput.value = traceTyped;
    setGhost(traceTarget);
  }
}

/** ---- Hint / Reveal button ---- **/
function onHintButton() {
  if (confirmRevealed) return;
  if (!revealMode) {
    revealMode = true;
    ui.hintBtn.textContent = "答えを表示";
    setHint(makeHint(current.en));
    setStatus("", "");
  } else {
    markWrong("答えを見ました（ミス扱い）");
    enterTraceMode();
  }
}

/** ---- Confirm (show answer) ---- **/
function onConfirmButton() {
  if (confirmRevealed) { nextQuestion(); return; }
  confirmRevealed = true;
  revealMode = false;
  traceMode = false;
  traceTarget = "";
  traceTyped = "";
  if (ui.confirmBtn) ui.confirmBtn.textContent = NEXT_LABEL;
  ui.hintBtn.textContent = "ヒントを表示";
  ui.checkBtn.disabled = true;
  ui.answerInput.readOnly = true;
  ui.answerInput.placeholder = "";
  ui.answerInput.value = String(current.en || "").trim();
  setHint("");
  setGhost("");
  setStatus("答え表示(失敗なし)", "");
  setDebug("");
  ui.answerInput.focus();
}

/** ---- Mute button ---- **/
document.getElementById("muteBtn").addEventListener("click", () => {
  soundEnabled = !soundEnabled;
  document.getElementById("muteBtn").textContent = soundEnabled ? "🔊" : "🔇";
});

/** ---------- Boot ---------- **/
(async function boot() {
  try {
    loadActiveSheetFromStorage();
    await loadItemsForActiveSheet();
  } catch (e) {
    ui.jpText.textContent = "読み込みに失敗しました";
    setStatus(String(e), "ng");
  }

  ui.checkBtn.addEventListener("click", checkAnswer);
  ui.hintBtn.addEventListener("click", onHintButton);
  if (ui.confirmBtn) ui.confirmBtn.addEventListener("click", onConfirmButton);

  if (ui.switchSheetBtn) {
    ui.switchSheetBtn.addEventListener("click", async () => {
      try {
        setView("list");
        setStatus("");
        const list = await loadSheetList();
        renderSheetList(list);
      } catch (e) {
        setStatus(String(e), "ng");
      }
    });
  }
  if (ui.closeSheetListBtn) {
    ui.closeSheetListBtn.addEventListener("click", () => setView("quiz"));
  }
  ui.exampleBtn.addEventListener("click", () => {
    setExampleVisible(!exampleVisible);
  });

  ui.answerInput.addEventListener("keydown", (ev) => {
    if (traceMode) { onKeyDownFallback(ev); return; }
    if (confirmRevealed) return;
    if (ev.key === "Enter" && !ev.isComposing && !isComposing) checkAnswer();
  });

  ui.answerInput.addEventListener("beforeinput", onBeforeInput);
  ui.answerInput.addEventListener("input", () => {
    if (!traceMode) return;
    if (!hasPinyinMarks(traceTarget)) return;
    const normalized = normalizeAnswerPair(ui.answerInput.value, traceTarget);
    if (normalized.user === normalized.answer) {
      setStatus("OK???", "ok");
      setTimeout(nextQuestion, NEXT_DELAY_MS);
    }
  });
  ui.answerInput.addEventListener("compositionstart", onCompositionStart);
  ui.answerInput.addEventListener("compositionend", onCompositionEnd);
})();
</script>
